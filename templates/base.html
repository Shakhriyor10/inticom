<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inticom</title>
    <style>
        :root {
            --bg: #0b1020;
            --surface: #ffffff;
            --surface-soft: #f8faff;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e2e8f0;
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #eef2ff 0%, #f8fafc 42%, #eef2ff 100%);
            color: var(--text);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            background: rgba(11, 16, 32, 0.9);
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.2px;
        }

        .top-nav {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #dbeafe;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 999px;
            transition: 0.2s ease;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

        .container { max-width: 1120px; margin: 28px auto; padding: 0 16px 36px; }

        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 22px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .section-title { margin: 0 0 6px; font-size: 28px; }
        .section-subtitle { margin: 0 0 18px; color: var(--muted); }

        .profiles-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
        .profile-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .profile-photo-wrap { background: #e2e8f0; }
        .profile-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        .profile-photo-placeholder { display: flex; align-items: center; justify-content: center; color: #64748b; font-weight: 600; }
        .profile-meta { padding: 16px; }
        .profile-meta p { margin: 6px 0; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
        .feature-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: linear-gradient(160deg, #f8faff 0%, #eef2ff 100%);
            border: 1px solid #c7d2fe;
            border-radius: var(--radius-lg);
            padding: 18px;
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .feature-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .feature-card h3 { margin: 0 0 8px; }
        .feature-card p { margin: 0; color: var(--muted); }

        .sidebar-layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
        .sidebar {
            background: var(--surface-soft);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 16px;
            height: fit-content;
        }
        .sidebar-name { font-size: 22px; font-weight: 700; margin: 0 0 12px; }
        .sidebar-menu { display: grid; gap: 8px; }
        .sidebar-menu a {
            text-decoration: none;
            color: var(--text);
            background: #fff;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 600;
        }
        .sidebar-menu a:hover { border-color: var(--primary); color: var(--primary); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }

        .form-grid { display: grid; gap: 12px; }
        input, select, textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            background: #fff;
        }
        textarea { min-height: 120px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            background: var(--primary);
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #e2e8f0; color: #0f172a; }

        .services-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .services-table th, .services-table td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        .services-table th { background: #f8fafc; }

        .messages { list-style: none; padding: 0; margin: 0 0 16px; }
        .messages li {
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            color: #155e75;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .errorlist { color: #dc2626; margin: 8px 0; }

        @media (max-width: 900px) {
            .profiles-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .sidebar-layout { grid-template-columns: 1fr; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            header { padding: 12px 14px; }
            .profiles-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 24px; }
        }
    </style>
</head>
<body>
<header>
    <a class="brand" href="{% url 'home' %}">Inticom</a>
    <nav class="top-nav">
        {% if user.is_authenticated %}
            <a class="nav-link" href="{% url 'my_profile' %}">Мой профиль</a>
            <a class="nav-link" href="{% url 'my_questionnaire' %}">Моя анкета</a>
            <a class="nav-link" href="{% url 'my_services' %}">Мои услуги</a>
            <a class="nav-link" href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a class="nav-link" href="{% url 'auth_page' %}">Войти</a>
        {% endif %}
    </nav>
</header>
<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
