<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inticom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #d6336c;
            --theme-primary-deep: #b81f58;
            --theme-soft: #fff0f6;
            --theme-card-border: #ffd6e7;
            --theme-muted: #7a4459;
        }
        body {
            background: linear-gradient(180deg, #fff5f8 0%, #ffe8ef 55%, #ffd9e8 100%);
        }
        .navbar-brand { font-weight: 700; letter-spacing: 0.4px; }
        .soft-card {
            border: 1px solid var(--theme-card-border);
            border-radius: 1rem;
            box-shadow: 0 16px 40px rgba(214, 51, 108, 0.12);
            background: rgba(255, 255, 255, 0.96);
        }
        .page-title { font-weight: 700; }
        .muted { color: var(--theme-muted); }
        .profile-image { aspect-ratio: 4/5; object-fit: cover; width: 100%; }
        .profile-placeholder {
            aspect-ratio: 4/5;
            display: grid;
            place-items: center;
            background: var(--theme-soft);
            color: var(--theme-muted);
            font-weight: 600;
        }
        .profile-name-link {
            color: var(--theme-primary-deep);
            text-decoration: none;
        }
        .profile-name-link:hover { color: var(--theme-primary); }
        .btn-gradient {
            border: 0;
            color: #fff;
            background: linear-gradient(135deg, var(--theme-primary) 0%, #ff4d8f 100%);
        }
        .btn-gradient:hover { color: #fff; background: linear-gradient(135deg, var(--theme-primary-deep) 0%, #f03e7a 100%); }
        .btn-outline-theme {
            border-color: var(--theme-primary);
            color: var(--theme-primary);
        }
        .btn-outline-theme:hover {
            border-color: var(--theme-primary);
            background: var(--theme-primary);
            color: #fff;
        }
        .detail-photo {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            border-radius: 1rem;
            border: 1px solid var(--theme-card-border);
        }
        .detail-photo-link { display: block; }
        .detail-photo-link:hover .detail-photo {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(214, 51, 108, 0.2);
        }
        .detail-photo { transition: .2s ease; }
        .detail-info, .detail-block {
            border: 1px solid var(--theme-card-border);
            border-radius: .9rem;
            padding: .85rem 1rem;
            background: #fff;
        }
        .service-item {
            padding: .5rem 0;
            border-bottom: 1px dashed #f1b6cb;
        }
        .service-item:last-child { border-bottom: 0; }
        .price-chip-wrap { display: flex; flex-wrap: wrap; gap: .5rem; }
        .price-chip {
            background: var(--theme-soft);
            color: var(--theme-primary-deep);
            border: 1px solid var(--theme-card-border);
            border-radius: 999px;
            padding: .35rem .75rem;
            font-size: .9rem;
            font-weight: 600;
        }
        .price-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: .6rem;
            width: min(520px, 100%);
            overflow-x: auto;
            padding-bottom: .1rem;
            scrollbar-width: thin;
            align-items: stretch;
        }
        .price-card {
            flex: 1 0 0;
            min-width: 145px;
            border: 1px solid var(--theme-card-border);
            border-radius: .85rem;
            background: linear-gradient(180deg, #fff 0%, #fff4f8 100%);
            padding: .65rem .75rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(214, 51, 108, 0.1);
        }
        .price-label {
            font-size: .8rem;
            color: var(--theme-muted);
            margin-bottom: .15rem;
        }
        .price-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--theme-primary-deep);
            line-height: 1.2;
        }
        .photo-modal-content {
            border: 1px solid var(--theme-card-border);
            border-radius: 1rem;
            max-width: min(680px, calc(100vw - 1.5rem));
            margin: 0 auto;
            background: linear-gradient(180deg, #fff 0%, #fff6fa 100%);
        }
        .photo-frame {
            width: 100%;
            height: min(68vh, 560px);
            border-radius: .85rem;
            border: 1px solid var(--theme-card-border);
            background: #fff;
            display: grid;
            place-items: center;
            overflow: hidden;
            padding: .35rem;
        }
        .photo-modal-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: .65rem;
            background: #fff;
        }
        .table thead th { white-space: nowrap; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(90deg, #b81f58 0%, #d6336c 60%, #ff4d8f 100%);">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Inticom</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_profile' %}">Мой профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_questionnaire' %}">Моя анкета</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_services' %}">Мои услуги</a></li>
                    <li class="nav-item"><a class="btn btn-light btn-sm" href="{% url 'logout' %}">Выйти</a></li>
                {% else %}
                    <li class="nav-item"><a class="btn btn-light btn-sm" href="{% url 'auth_page' %}">Войти</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info soft-card">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
