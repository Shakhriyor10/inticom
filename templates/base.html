<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inticom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #f5f7ff 0%, #f8fafc 55%, #eef2ff 100%);
        }
        .navbar-brand { font-weight: 700; letter-spacing: 0.4px; }
        .soft-card {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        }
        .page-title { font-weight: 700; }
        .muted { color: #64748b; }
        .profile-image { aspect-ratio: 4/5; object-fit: cover; width: 100%; }
        .profile-placeholder {
            aspect-ratio: 4/5;
            display: grid;
            place-items: center;
            background: #e2e8f0;
            color: #64748b;
            font-weight: 600;
        }
        .table thead th { white-space: nowrap; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Inticom</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_profile' %}">Мой профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_questionnaire' %}">Моя анкета</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_services' %}">Мои услуги</a></li>
                    <li class="nav-item"><a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Выйти</a></li>
                {% else %}
                    <li class="nav-item"><a class="btn btn-outline-light btn-sm" href="{% url 'auth_page' %}">Войти</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info soft-card">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
