<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inticom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #d6336c;
            --theme-primary-deep: #b81f58;
            --theme-soft: #fff0f6;
            --theme-card-border: #ffd6e7;
            --theme-muted: #7a4459;
        }
        body {
            background: linear-gradient(180deg, #fff5f8 0%, #ffe8ef 55%, #ffd9e8 100%);
        }
        .navbar-brand { font-weight: 700; letter-spacing: 0.4px; }
        .soft-card {
            border: 1px solid var(--theme-card-border);
            border-radius: 1rem;
            box-shadow: 0 16px 40px rgba(214, 51, 108, 0.12);
            background: rgba(255, 255, 255, 0.96);
        }
        .page-title { font-weight: 700; }
        .muted { color: var(--theme-muted); }
        .profile-image { aspect-ratio: 4/5; object-fit: cover; width: 100%; }
        .profile-placeholder {
            aspect-ratio: 4/5;
            display: grid;
            place-items: center;
            background: var(--theme-soft);
            color: var(--theme-muted);
            font-weight: 600;
        }
        .profile-name-link {
            color: var(--theme-primary-deep);
            text-decoration: none;
        }
        .profile-name-link:hover { color: var(--theme-primary); }
        .btn-gradient {
            border: 0;
            color: #fff;
            background: linear-gradient(135deg, var(--theme-primary) 0%, #ff4d8f 100%);
        }
        .btn-gradient:hover { color: #fff; background: linear-gradient(135deg, var(--theme-primary-deep) 0%, #f03e7a 100%); }
        .btn-outline-theme {
            border-color: var(--theme-primary);
            color: var(--theme-primary);
        }
        .btn-outline-theme:hover {
            border-color: var(--theme-primary);
            background: var(--theme-primary);
            color: #fff;
        }
        .detail-photo {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            border-radius: 1rem;
            border: 1px solid var(--theme-card-border);
        }
        .detail-info, .detail-block {
            border: 1px solid var(--theme-card-border);
            border-radius: .9rem;
            padding: .85rem 1rem;
            background: #fff;
        }
        .service-item {
            padding: .5rem 0;
            border-bottom: 1px dashed #f1b6cb;
        }
        .service-item:last-child { border-bottom: 0; }
        .price-chip-wrap { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
        .price-chip {
            background: var(--theme-soft);
            color: var(--theme-primary-deep);
            border: 1px solid var(--theme-card-border);
            border-radius: 999px;
            padding: .35rem .75rem;
            font-size: .9rem;
            font-weight: 600;
        }
        .table thead th { white-space: nowrap; }

        .service-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: .5rem;
            padding: .75rem;
            background: #fff;
            border: 1px solid var(--theme-card-border);
            border-radius: .75rem;
            max-height: 280px;
            overflow-y: auto;
        }
        .service-options > div {
            margin: 0;
        }
        .service-options label {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: 0;
            color: #5f3044;
            border: 1px solid #f7c5da;
            border-radius: .6rem;
            padding: .5rem .65rem;
            width: 100%;
            cursor: pointer;
            background: #fff8fb;
        }
        .service-options label:hover {
            border-color: #eca8c5;
            background: #fff1f7;
        }
        .service-options input[type="checkbox"] {
            margin: 0;
            width: 1.05rem;
            height: 1.05rem;
            flex-shrink: 0;
        }
        .profile-availability-switch {
            align-items: center;
            display: flex;
            gap: .75rem;
            background: #fff8fb;
            border: 1px solid #f7c5da;
        }
        .profile-availability-switch .form-check-input {
            float: none;
            margin: 0;
            flex-shrink: 0;
        }
        .profile-availability-switch .form-check-label {
            margin: 0;
            color: #5f3044;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(90deg, #b81f58 0%, #d6336c 60%, #ff4d8f 100%);">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Inticom</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_profile' %}">Мой профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_questionnaire' %}">Моя анкета</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_services' %}">Мои услуги</a></li>
                    <li class="nav-item"><a class="btn btn-light btn-sm" href="{% url 'logout' %}">Выйти</a></li>
                {% else %}
                    <li class="nav-item"><a class="btn btn-light btn-sm" href="{% url 'auth_page' %}">Войти</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info soft-card">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
