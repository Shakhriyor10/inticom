<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inticom</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f9; }
        header { background: #1f2937; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: #fff; margin-left: 14px; text-decoration: none; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .profiles-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
        .profile-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); }
        .profile-photo-wrap { background: #f3f4f6; }
        .profile-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        .profile-photo-placeholder { display: flex; align-items: center; justify-content: center; color: #6b7280; font-weight: 600; }
        .profile-meta { padding: 12px 14px 14px; }
        .profile-meta p { margin: 6px 0; }
        .photos { display: flex; gap: 8px; flex-wrap: wrap; }
        .photos img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; }
        .form-row { margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { display: inline-block; border: 0; background: #2563eb; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .errorlist { color: #dc2626; }
        .messages { list-style: none; padding: 0; }
        .messages li { background: #dcfce7; color: #166534; padding: 10px; border-radius: 6px; margin-bottom: 10px; }

        .profile-layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
        .profile-sidebar { border-right: 1px solid #e5e7eb; padding-right: 14px; }
        .sidebar-name { font-size: 24px; font-weight: 700; margin-bottom: 16px; }
        .sidebar-link { display: block; margin-bottom: 8px; color: #2563eb; text-decoration: none; font-weight: 600; }
        .profile-main .section-block { margin-bottom: 24px; }
        .services-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .services-table th, .services-table td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; }
        .services-table th { background: #f3f4f6; }
        @media (max-width: 900px) { .profiles-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 640px) { .profiles-grid { grid-template-columns: 1fr; } .profile-layout { grid-template-columns: 1fr; } .profile-sidebar { border-right: 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 12px; } }
    </style>
</head>
<body>
<header>
    <div><a href="{% url 'home' %}">Inticom</a></div>
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'my_profile' %}">Мой профиль</a>
            <a href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'auth_page' %}">Войти</a>
        {% endif %}
    </nav>
</header>
<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
